name: Release

permissions:
   id-token: write
   contents: write

on:
   push:
      tags:
         - "@felixicaza/astro-capo@*"
         - "capo-rules@*"

jobs:
   release:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v6
           with:
              fetch-depth: 0

         - uses: actions/setup-node@v6
           with:
              node-version: lts/*
              registry-url: https://registry.npmjs.org/

         - uses: pnpm/action-setup@v6
           with:
              version: latest

         - name: Install dependencies
           run: pnpm ci

         - name: Build packages
           run: pnpm build

         - run: pnpx changelogithub
           env:
              GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

         - name: Resolve package from tag
           run: |
              TAG="${GITHUB_REF_NAME}"

              if [[ "$TAG" == @felixicaza/astro-capo@* ]]; then
                echo "PACKAGE_DIR=packages/astro-capo" >> "$GITHUB_ENV"
                echo "PACKAGE_NAME=@felixicaza/astro-capo" >> "$GITHUB_ENV"
              elif [[ "$TAG" == capo-rules@* ]]; then
                echo "PACKAGE_DIR=packages/capo-rules" >> "$GITHUB_ENV"
                echo "PACKAGE_NAME=capo-rules" >> "$GITHUB_ENV"
              else
                echo "Unsupported tag format: $TAG"
                exit 1
              fi

              echo "DIST_TAG=latest" >> "$GITHUB_ENV"

         - name: Publish selected package
           run: |
              echo "Publishing $PACKAGE_NAME from $PACKAGE_DIR with dist-tag: $DIST_TAG"
              pnpm -C "$PACKAGE_DIR" publish --access public --no-git-checks
           env:
              NPM_CONFIG_PROVENANCE: true
